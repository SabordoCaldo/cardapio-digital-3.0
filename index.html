<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabor do Caldo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d32f2f">

<style>
body{margin:0;font-family:Arial;background:#fff;}

.header{
  background:#d32f2f;
  color:white;
  padding:15px;
}

.logo{
  width:60px;height:60px;border-radius:50%;background:white;margin-bottom:10px;
}

.categorias{
  display:flex;overflow-x:auto;gap:10px;padding:10px;
}

.cat{
  padding:8px 15px;background:#eee;border-radius:20px;
}

.cat.ativo{background:#d32f2f;color:white;}

.lista{padding:10px;}

.card{
  display:flex;justify-content:space-between;
  margin-bottom:15px;cursor:pointer;
}

.card img{
  width:90px;height:90px;border-radius:10px;
}

.carrinho{
  position:fixed;bottom:20px;right:20px;
  width:60px;height:60px;border-radius:50%;
  background:black;color:white;
  display:flex;align-items:center;justify-content:center;
}

.badge{
  position:absolute;top:0;right:0;
  background:red;color:white;font-size:12px;
  border-radius:50%;padding:3px 6px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo"></div>
  <h2>Sabor do Caldo</h2>
  <p>Quinta a Domingo - 19h às 23h</p>
</div>

<div class="categorias">
  <div class="cat ativo" onclick="trocar('promo', this)">Ofertas</div>
  <div class="cat" onclick="trocar('caldos', this)">Caldos</div>
  <div class="cat" onclick="trocar('bebidas', this)">Bebidas</div>
</div>

<div id="lista" class="lista"></div>

<div class="carrinho" onclick="irCarrinho()">
🛒 <div class="badge" id="cont">0</div>
</div>

<script src="caldos.js"></script>
<script src="bebidas.js"></script>
<script src="promocoes.js"></script>

<script>
let categoria="promo";

function trocar(cat,el){
  categoria=cat;
  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("ativo"));
  el.classList.add("ativo");
  render();
}

function abrirProduto(item){
  localStorage.setItem("produtoSelecionado", JSON.stringify(item));
  location.href="produto.html";
}

function render(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";

  let dados=[];
  if(categoria==="promo") dados=promocoes;
  if(categoria==="caldos") dados=caldos;
  if(categoria==="bebidas") dados=bebidas;

  dados.forEach(item=>{
    lista.innerHTML+=`
      <div class="card" onclick='abrirProduto(${JSON.stringify(item)})'>
        <div>
          <h3>${item.nome}</h3>
          <p>${item.descricao}</p>
          <strong>R$ ${item.preco.toFixed(2).replace(".",",")}</strong>
        </div>
        <img src="${item.imagem}">
      </div>
    `;
  });
}

function atualizar(){
  let c=JSON.parse(localStorage.getItem("carrinho"))||[];
  let total=c.reduce((a,i)=>a+i.qtd,0);
  document.getElementById("cont").innerText=total;
}

function irCarrinho(){location.href="carrinho.html";}

render();
atualizar();
</script>

</body>
</html>
