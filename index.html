<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabor do Caldo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d32f2f">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

/* HEADER */
.header{
  background:#d32f2f;
  color:white;
  padding:15px;
}

.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#fff;
  margin-bottom:10px;
}

.header h2{
  margin:0;
}

.info{
  font-size:13px;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
}

.cat{
  padding:8px 15px;
  background:#eee;
  border-radius:20px;
  white-space:nowrap;
  cursor:pointer;
}

.cat.ativo{
  background:#d32f2f;
  color:white;
}

/* LISTA */
.lista{
  padding:10px;
}

/* CARD */
.card{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  cursor:pointer;
}

.card img{
  width:90px;
  height:90px;
  border-radius:10px;
}

/* CARRINHO */
.carrinho{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  width:60px;
  height:60px;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.badge{
  position:absolute;
  top:0;
  right:0;
  background:red;
  color:white;
  font-size:12px;
  padding:3px 6px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"></div>
  <h2>Sabor do Caldo</h2>
  <div class="info">
    Cardápio<br>
    CNPJ 61.986.117/0001-80<br>
    Quinta a Domingo - 19h às 23h
  </div>
</div>

<!-- CATEGORIAS -->
<div class="categorias">
  <div class="cat ativo" onclick="trocar('todos', this)">Ofertas</div>
  <div class="cat" onclick="trocar('caldos', this)">Caldos</div>
  <div class="cat" onclick="trocar('bebidas', this)">Bebidas</div>
</div>

<!-- LISTA -->
<div class="lista" id="lista"></div>

<!-- BOTÃO CARRINHO -->
<div class="carrinho" onclick="irCarrinho()">
  🛒
  <div class="badge" id="contador">0</div>
</div>

<script src="caldos.js"></script>
<script src="bebidas.js"></script>
<script src="promocoes.js"></script>

<script>
let categoria = "todos";

function trocar(cat, el){
  categoria = cat;

  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("ativo"));
  el.classList.add("ativo");

  render();
}

function abrirProduto(item){
  localStorage.setItem("produtoSelecionado", JSON.stringify(item));
  window.location.href = "produto.html";
}

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let dados = [];

  if(categoria==="todos") dados = promocoes;
  if(categoria==="caldos") dados = caldos;
  if(categoria==="bebidas") dados = bebidas;

  dados.forEach(item=>{
    lista.innerHTML += `
      <div class="card" onclick='abrirProduto(${JSON.stringify(item)})'>
        <div>
          <h3>${item.nome}</h3>
          <p>${item.descricao}</p>
          <strong>R$ ${item.preco.toFixed(2).replace(".",",")}</strong>
        </div>
        <img src="${item.imagem}">
      </div>
    `;
  });
}

function atualizarCarrinho(){
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  let total = carrinho.reduce((acc,i)=>acc+i.qtd,0);

  document.getElementById("contador").innerText = total;
}

function irCarrinho(){
  window.location.href = "carrinho.html";
}

render();
atualizarCarrinho();
</script>

</body>
</html>
