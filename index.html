<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e30613">

<title>Cardápio</title>

<style>
body{margin:0;font-family:Arial;background:#fff;}

.header{
background:#e30613;
color:#fff;
padding:15px;
}

.logo{
width:60px;height:60px;border-radius:50%;background:#fff;
}

.topo{display:flex;gap:10px;align-items:center;}

.aviso{
background:#000;
color:#fff;
text-align:center;
padding:8px;
font-weight:bold;
}

.container{padding:10px;}

.titulo{
color:#e30613;
font-size:20px;
margin-top:20px;
}

.item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
padding:10px 0;
cursor:pointer;
}

.item img{
width:90px;height:90px;border-radius:10px;object-fit:cover;
}

.carrinho{
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:#fff;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.badge{
position:absolute;
top:0;
right:0;
background:red;
border-radius:50%;
padding:4px;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="topo">
<div class="logo"></div>
<div>
<h2>Cardápio</h2>
<b>Sabor do Caldo</b><br>
CNPJ 61.986.117/0001-80<br>
Qui a Dom - 19h às 23h
</div>
</div>
</div>

<div class="aviso">
Pedido mínimo R$20,00 - Entrega grátis
</div>

<div class="container" id="lista"></div>

<div class="carrinho" onclick="location.href='carrinho.html'">
🛒 <div class="badge" id="cont">0</div>
</div>

<script src="ofertas.js"></script>
<script src="caldos.js"></script>
<script src="bebidas.js"></script>

<script>
function abrir(p){
localStorage.setItem("produtoSelecionado",JSON.stringify(p));
location.href="produto.html";
}

function render(titulo, lista){
let html=`<div class="titulo">${titulo}</div>`;

lista.forEach(p=>{
html+=`
<div class="item" onclick='abrir(${JSON.stringify(p)})'>
<div>
<b>${p.nome}</b><br>
${p.descricao}<br>
<b>R$ ${p.preco.toFixed(2).replace(".",",")}</b>
</div>
<img src="${p.imagem}">
</div>`;
});

return html;
}

let tudo="";
tudo+=render("Ofertas",ofertas);
tudo+=render("Caldos",caldos);
tudo+=render("Bebidas",bebidas);

document.getElementById("lista").innerHTML=tudo;

function atualizar(){
let c=JSON.parse(localStorage.getItem("carrinho"))||[];
let total=c.reduce((a,i)=>a+i.qtd,0);
document.getElementById("cont").innerText=total;
}
atualizar();

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
