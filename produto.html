<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;padding:15px;}

.add{display:flex;justify-content:space-between;margin:10px 0;}

.btn{width:100%;padding:15px;background:#25D366;color:#fff;border:none;}
</style>
</head>

<body>

<h2 id="nome"></h2>
<p id="desc"></p>
<h3 id="preco"></h3>

<div id="extras"></div>

<input id="obs" placeholder="Observação" style="width:100%;padding:10px">

<div>
<button onclick="menos()">-</button>
<span id="qtd">1</span>
<button onclick="mais()">+</button>
</div>

<button class="btn" onclick="add()">Adicionar</button>

<script>
let p=JSON.parse(localStorage.getItem("produtoSelecionado"));
let qtd=1;

let adicionais=[
{nome:"Bacon",preco:2,qtd:0},
{nome:"Calabresa",preco:2,qtd:0}
];

nome.innerText=p.nome;
desc.innerText=p.descricao;

function renderExtras(){
let html="";
adicionais.forEach((a,i)=>{
html+=`
<div class="add">
${a.nome} (+${a.preco})
<div>
<button onclick="menosAdd(${i})">-</button>
${a.qtd}
<button onclick="maisAdd(${i})">+</button>
</div>
</div>`;
});
extras.innerHTML=html;
}

function total(){
let t=p.preco;
adicionais.forEach(a=>t+=a.preco*a.qtd);
return t*qtd;
}

function atualizar(){
preco.innerText="R$ "+total().toFixed(2);
}

function mais(){qtd++;qtdSpan()}
function menos(){if(qtd>1)qtd--;qtdSpan()}

function qtdSpan(){
document.getElementById("qtd").innerText=qtd;
atualizar();
}

function maisAdd(i){adicionais[i].qtd++;renderExtras();atualizar();}
function menosAdd(i){if(adicionais[i].qtd>0)adicionais[i].qtd--;renderExtras();atualizar();}

function add(){
let carrinho=JSON.parse(localStorage.getItem("carrinho"))||[];

carrinho.push({
nome:p.nome,
qtd:qtd,
preco:p.preco,
adicionais:adicionais,
obs:obs.value
});

localStorage.setItem("carrinho",JSON.stringify(carrinho));
location.href="carrinho.html";
}

renderExtras();
atualizar();
</script>

</body>
</html>
