<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#fff;}
.img{width:100%;height:220px;object-fit:cover;}
.container{padding:15px;padding-bottom:120px;}
.footer{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;}
.btn{width:100%;padding:15px;background:#25D366;color:white;border:none;border-radius:10px;}
</style>
</head>

<body>

<img id="img" class="img">

<div class="container">
<h2 id="nome"></h2>
<p id="desc"></p>
<div id="preco"></div>

<div id="extras"></div>

<input id="obs" placeholder="Observação" style="width:100%;padding:10px;margin-top:10px">

<div>
<button onclick="menos()">-</button>
<span id="qtd">1</span>
<button onclick="mais()">+</button>
</div>

</div>

<div class="footer">
<button class="btn" onclick="add()">Adicionar</button>
</div>

<script>
let p=JSON.parse(localStorage.getItem("produtoSelecionado"));
let qtd=1;
let total=p.preco;

img.src=p.imagem;
nome.innerText=p.nome;
desc.innerText=p.descricao;

function atualizar(){
preco.innerText="R$ "+(total*qtd).toFixed(2).replace(".",",");
}

function add(){
let carrinho=JSON.parse(localStorage.getItem("carrinho"))||[];

carrinho.push({
nome:p.nome,
qtd:qtd,
preco:total,
obs:obs.value
});

localStorage.setItem("carrinho",JSON.stringify(carrinho));
location.href="carrinho.html";
}

function mais(){qtd++;qtdSpan()}
function menos(){if(qtd>1)qtd--;qtdSpan()}

function qtdSpan(){
document.getElementById("qtd").innerText=qtd;
atualizar();
}

atualizar();
</script>

</body>
</html>
